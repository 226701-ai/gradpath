<!DOCTYPE html>
<html>
<head>
    <title>GradPath Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-page">

    <div class="login-card">

        <h1>🎓 GradPath</h1>
        <h2>Login Portal</h2>

        <p>
            Sign in as administrator or student to access your dashboard.
        </p>

        <form id="loginForm" class="login-form">

            <input
                type="text"
                id="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >

            <button type="submit">Login</button>

        </form>

        <p id="loginMessage" class="login-message"></p>

        <div class="login-hint">
        <p> New student?
    <a href="register.html">Create an account</a> 
    <br>
    <a style="margin: auto;" href="/forgot.html">Forgot password?</a>
</p>
        </div>

    </div>

</div>

<script src="login.js"></script>

</body>
</html>
