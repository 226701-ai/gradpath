<!DOCTYPE html>
<html>
<head>
    <title>Internship Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">GradPath</div>
    <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="student.html">Students</a>
        <a href="activity.html">Activities</a>
        <a href="outcome.html">Outcomes</a>
        <a href="course.html">Courses</a>
        <a href="enrolment.html">Enrolments</a>
        <a href="studentActivity.html">Student Activities</a>
        <a href="certification.html">Certifications</a>
        <a href="internship.html">Internships</a>
        <a href="index.html">Logout</a>
    </div>
</nav>

<div class="container">
    <h1>Internship Management</h1>

    <form id="internForm" class="management-form">
        <select id="student_id" required>
            <option value="">Select Student</option>
        </select>

        <input type="text" id="company_name" placeholder="Company Name" required>

        <select id="rating" required>
            <option value="" disabled selected>Company Rating (1-5)</option>
            <option value="5">5 - Excellent</option>
            <option value="4">4 - Very Good</option>
            <option value="3">3 - Good</option>
            <option value="2">2 - Fair</option>
            <option value="1">1 - Poor</option>
        </select>

        <button type="submit">Add Internship</button>
    </form>

    <table class="data-table">
        <thead>
            <tr>
                <th>Student</th>
                <th>Company</th>
                <th>Rating</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="internList"></tbody>
    </table>
</div>

<script src="internship.js"></script>
</body>
</html>
