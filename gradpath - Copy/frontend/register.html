<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-page">
    <div class="login-card">

        <h1>🎓 GradPath</h1>
        <h2>Student Registration</h2>

        <form id="registerForm" class="login-form">
            <input type="text" id="matric" placeholder="Matric Number" required>
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="text" id="programme" placeholder="Programme" required>
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>

            <button type="submit">Register</button>
        </form>

        <p id="registerMessage" class="login-message"></p>

        <p>
            Already have an account?
            <a href="login.html?role=student">Login here</a>
        </p>

    </div>
</div>

<script src="register.js"></script>

</body>
</html>
