<!DOCTYPE html>
<html>
<head>
    <title>Activity Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">
        GradPath
    </div>

    <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="student.html">Students</a>
        <a href="activity.html">Activities</a>
        <a href="outcome.html">Outcomes</a>
        <a href="course.html">Courses</a>
        <a href="enrolment.html">Enrolment</a>
        <a href="studentActivity.html">Student Activities</a>
    </div>
</nav>

<div class="container">

    <div class="page-header">
        <div>
            <h1>Activity Management</h1>

            <p class="page-description">
                Manage student activities, scores and related learning outcomes.
            </p>
        </div>

        <div class="stat-chip">
            Total Activities:
            <span id="activityCount">0</span>
        </div>
    </div>

    <input
        type="text"
        id="searchActivity"
        placeholder="Search activity name, type, score or outcome..."
        class="search-box"
    >

    <form id="activityForm" class="management-form">

        <input
            type="text"
            id="activity_name"
            placeholder="Activity Name"
            required
        >

        <input
            type="text"
            id="activity_type"
            placeholder="Activity Type"
            required
        >

        <input
            type="number"
            id="score"
            placeholder="Base Activity Score"
            required
        >

        <select id="outcome_id" required>
            <option value="">Select Outcome</option>
        </select>

        <button type="submit">
            Add Activity
        </button>

    </form>

    <div id="activityList"></div>

</div>

<div id="editActivityModal" class="modal">
    <div class="modal-content">
        <h2>Edit Activity</h2>

        <input type="text" id="editActivityName" placeholder="Activity Name">
        <input type="text" id="editActivityType" placeholder="Activity Type">
        <input type="number" id="editScore" placeholder="Score">

        <select id="editOutcomeId" required>
            <option value="">Select Outcome</option>
        </select>

        <div class="modal-actions">
            <button onclick="updateActivity()">Save Changes</button>
            <button onclick="closeActivityModal()" class="secondary-btn">Cancel</button>
        </div>
    </div>
</div>

<script src="activity.js"></script>

</body>
</html>
