<!DOCTYPE html>
<html>
<head>
    <title>Student Activities</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">GradPath</div>

    <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="student.html">Students</a>
        <a href="activity.html">Activities</a>
        <a href="outcome.html">Outcomes</a>
        <a href="course.html">Courses</a>
        <a href="enrolment.html">Enrolment</a>
        <a href="studentActivity.html">Student Activities</a>
    </div>
</nav>

<div class="container">

    <h1>Student Activities</h1>

    <form id="studentActivityForm">

        <select id="student_id" required>
            <option value="">Select Student</option>
        </select>

        <select id="activity_id" required>
            <option value="">Select Activity</option>
        </select>

        <button type="submit">Assign Activity</button>

    </form>

    <input
        type="text"
        id="searchStudentActivity"
        placeholder="🔍 Search student activity..."
        class="search-box"
    >

    <table class="data-table">

        <thead>
            <tr>
                <th>Student</th>
                <th>Activity</th>
                <th>Score</th>
                <th>Outcome</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="studentActivityList"></tbody>

    </table>

</div>

<script src="studentActivity.js"></script>

</body>
</html>
